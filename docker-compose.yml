version: '3.8'

services:
  # PostgreSQL для приложения
  app-db:
    image: postgres:15-alpine
    container_name: cloverdashbot-app-db
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: cloverdashbot
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-secure_password}
    volumes:
      - app-db-data:/var/lib/postgresql/data
      - ./deployment/init-app-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - cloverdashbot-network
    restart: unless-stopped

  # PostgreSQL для пользовательских данных
  data-db:
    image: postgres:15-alpine
    container_name: cloverdashbot-data-db
    environment:
      POSTGRES_DB: data_db
      POSTGRES_USER: cloverdashbot
      POSTGRES_PASSWORD: ${DATA_DB_PASSWORD:-secure_password}
    volumes:
      - data-db-data:/var/lib/postgresql/data
      - ./deployment/init-data-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - cloverdashbot-network
    restart: unless-stopped

  # Backend API
  backend:
    build: ./backend
    container_name: cloverdashbot-backend
    environment:
      - DEBUG=false
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - APP_DATABASE_URL=postgresql://cloverdashbot:${APP_DB_PASSWORD:-secure_password}@app-db:5432/app_db
      - DATA_DATABASE_URL=postgresql://cloverdashbot:${DATA_DB_PASSWORD:-secure_password}@data-db:5432/data_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-key-change-in-production}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    ports:
      - "8000:8000"
    depends_on:
      - app-db
      - data-db
    networks:
      - cloverdashbot-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # Telegram Bot
  telegram-bot:
    build: ./telegram-bot
    container_name: cloverdashbot-telegram
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - BACKEND_URL=http://backend:8000
      - LOG_LEVEL=INFO
    depends_on:
      - backend
    networks:
      - cloverdashbot-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # Nginx (опционально, для production)
  nginx:
    image: nginx:alpine
    container_name: cloverdashbot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/nginx.conf
      - ./deployment/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - cloverdashbot-network
    restart: unless-stopped
    profiles:
      - production

volumes:
  app-db-data:
    driver: local
  data-db-data:
    driver: local

networks:
  cloverdashbot-network:
    driver: bridge 